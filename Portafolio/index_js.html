<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Productos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container text-center mt-5">
    <h1 class="mb-4">Crear Producto</h1>

    <div class="row justify-content-center">
      <div class="col-md-6">

        <input type="text" id="nombre" class="form-control mb-3" placeholder="Nombre del producto">

        <input type="number" id="precio" class="form-control mb-3" placeholder="Precio">

        <input type="text" id="imagen" class="form-control mb-3" placeholder="URL de la imagen">

        <button id="crearBtn" class="btn btn-success w-100">
          Crear Producto
        </button>

      </div>
    </div>

   
    <div id="listaProductos" class="row justify-content-center mt-5"></div>

  </div>

  <script src="script.js"></script>
</body>
</html>
