<main class="search-results">
  <div class="container py-4">
    <header class="search-results__header">
      <h1 class="search-results__title">
        <span *ngIf="query">Resultados de búsqueda: "{{ query }}"</span>
        <span *ngIf="!query">Buscar Películas</span>
      </h1>
      <p *ngIf="totalResults > 0" class="search-results__count">
        {{ totalResults }} película{{ totalResults !== 1 ? 's' : '' }} encontrada{{ totalResults !== 1 ? 's' : '' }}
      </p>
    </header>

    <!-- Loading State -->
    <div *ngIf="loading" class="loading-container">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Buscando...</span>
      </div>
    </div>

    <!-- Error State -->
    <div *ngIf="error" class="alert alert-warning" role="alert">
      {{ error }}
    </div>

    <!-- Results -->
    <div *ngIf="!loading && movies.length > 0" class="search-results__grid">
      <app-movie-card
        *ngFor="let movie of movies; let i = index"
        [movie]="movie"
        [isFavorite]="isFavorite(movie.id)"
        [style.animation-delay]="(i * 50) + 'ms'"
        (toggleFavorite)="onToggleFavorite($event)"
      ></app-movie-card>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && !query" class="search-results__empty">
      <p>Ingresa un término de búsqueda para encontrar películas.</p>
    </div>

    <!-- Pagination -->
    <nav *ngIf="totalPages > 1" class="search-results__pagination" aria-label="Paginación de resultados">
      <ul class="pagination justify-content-center">
        <li class="page-item" [class.disabled]="currentPage === 1">
          <button class="page-link" (click)="goToPage(currentPage - 1)" type="button">
            &laquo; Anterior
          </button>
        </li>
        <li *ngFor="let page of pageNumbers" class="page-item" [class.active]="page === currentPage">
          <button class="page-link" (click)="goToPage(page)" type="button">
            {{ page }}
          </button>
        </li>
        <li class="page-item" [class.disabled]="currentPage === totalPages">
          <button class="page-link" (click)="goToPage(currentPage + 1)" type="button">
            Siguiente &raquo;
          </button>
        </li>
      </ul>
    </nav>
  </div>
</main>
